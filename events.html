<!DOCTYPE html>
<html>
<head>
<title>Events - Campus Connect</title>
<link rel="stylesheet" href="style.css">

<style>
.events-container{
padding:30px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.event-card{
background:linear-gradient(135deg,#ff9966,#ff5e62);
color:white;
padding:20px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
transition:0.3s;
}

.event-card:hover{
transform:scale(1.05);
}

.event-btn{
margin-top:10px;
background:white;
color:#ff5e62;
border:none;
padding:8px 15px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}
</style>

</head>

<body>

<h1 style="padding:20px;">College Events</h1>

<div class="events-container">

<div class="event-card">
<h3>Hackathon 2026</h3>
<p>Date: 30 March</p>
<button class="event-btn">Register</button>
</div>

<div class="event-card">
<h3>AI Workshop</h3>
<p>Date: 2 April</p>
<button class="event-btn">Register</button>
</div>

<div class="event-card">
<h3>Tech Seminar</h3>
<p>Date: 5 April</p>
<button class="event-btn">Register</button>
</div>

<div class="event-card">
<h3>Gaming Competition</h3>
<p>Date: 10 April</p>
<button class="event-btn">Register</button>
</div>

</div>

</body>
</html>
