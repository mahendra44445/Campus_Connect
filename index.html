<!DOCTYPE html>
<html>
<head>
<title>Campus Connect Login</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="login-body">

<div class="login-box">

<h2>Campus Connect</h2>

<p class="welcome-msg">
Welcome to Campus Connect 🎓 <br>
Your smart college companion to manage assignments, events and study materials.
</p>

<input type="text" id="userid" placeholder="User ID"><br>
<input type="password" id="password" placeholder="Password"><br>

<button onclick="login()">Login</button>

<p id="error"></p>

<p class="register-link">
New student? <a href="register.html">Register here</a>
</p>

</div>

<script src="script.js"></script>

</body>
</html>
